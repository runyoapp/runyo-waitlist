<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#F1EEE6"/>
  <!-- Progress bar accent -->
  <rect x="0" y="0" width="1200" height="6" fill="#DEDACA"/>
  <rect x="0" y="0" width="720" height="6" fill="#00B98E"/>
  <!-- Logo -->
  <text x="80" y="120" font-family="'Sora', system-ui, sans-serif" font-size="72" font-weight="700" fill="#0E1F1A" letter-spacing="-3">runyo</text>
  <!-- Tagline -->
  <text x="80" y="200" font-family="'Sora', system-ui, sans-serif" font-size="36" font-weight="500" fill="#5E6F69" letter-spacing="-1">Schema's die meelopen.</text>
  <!-- Waitlist badge -->
  <rect x="80" y="250" width="160" height="32" rx="6" fill="rgba(0,185,142,0.15)"/>
  <text x="160" y="272" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="600" fill="#00B98E" text-anchor="middle" letter-spacing="2">WAITLIST OPEN</text>
  <!-- Mock today card -->
  <rect x="780" y="120" width="340" height="180" rx="16" fill="#FBF7EC" stroke="#DEDACA" stroke-width="1"/>
  <text x="808" y="156" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" fill="#86968F" letter-spacing="2">VANDAAG</text>
  <text x="808" y="188" font-family="'Sora', system-ui, sans-serif" font-size="20" font-weight="600" fill="#0E1F1A">Easy run, 12,0 km</text>
  <rect x="808" y="220" width="284" height="4" rx="2" fill="#DEDACA"/>
  <rect x="808" y="220" width="34" height="4" rx="2" fill="#00B98E"/>
  <text x="808" y="248" font-family="'JetBrains Mono', monospace" font-size="9" fill="#86968F" letter-spacing="1">WK 4 / 12</text>
  <text x="1092" y="248" font-family="'JetBrains Mono', monospace" font-size="9" fill="#86968F" letter-spacing="1" text-anchor="end">ROTTERDAM, 19 APR</text>
  <!-- Domain -->
  <text x="80" y="580" font-family="'JetBrains Mono', monospace" font-size="16" fill="#86968F" letter-spacing="1">runyo.app</text>
</svg>
